name: Playwright UI Tests

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *' # Runs at minute 0 past every hour

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium firefox webkit
      
    - name: Run Pytest
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        TEST_PLATFORM: Desktop 💻
      run: pytest -v > pytest_output.txt 2>&1
      continue-on-error: true
      
    - name: Prepare Pages directory
      if: always()
      run: |
        python generate_dashboard.py
        mkdir -p public
        cp dashboard.html public/index.html
        cp dashboard_template.html public/ || true
        cp report.json public/report.json || true
        cp pytest_output.txt public/pytest_output.txt || true
        cp -r screenshots public/screenshots || true
        
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      if: always()
      with:
        path: public

  deploy:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
