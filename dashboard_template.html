<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>UI Bot Test Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#004ac6",
                        surface: "#f7f9fb",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f4f6",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#434655",
                        "outline-variant": "#c3c6d7",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <header class="h-16 bg-surface-container-lowest border-b border-outline-variant/30 flex items-center justify-between px-8 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white shadow-sm">
                <span class="material-symbols-outlined !text-[18px]">verified</span>
            </div>
            <h1 class="text-lg font-semibold tracking-tight text-on-surface">UI Bot Test Report</h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-sm text-on-surface-variant flex items-center gap-2">
                <span class="material-symbols-outlined !text-[18px]">account_circle</span>
                Admin View
            </div>
            <a href="https://github.com/areglk12345-spec/UI.Bot" target="_blank" class="p-2 text-on-surface-variant hover:text-primary transition-colors bg-surface-container-low rounded-full">
                <span class="material-symbols-outlined !text-[20px]">code</span>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-8 max-w-[1400px] mx-auto w-full flex flex-col gap-8">
        
        <!-- Header Section -->
        <div class="flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-bold text-on-surface mb-1">Test Execution Overview</h2>
                <p class="text-sm text-on-surface-variant opacity-80"><!-- STAT_SUMMARY --></p>
            </div>
            <button onclick="downloadReport()" class="px-5 py-2.5 bg-primary text-white rounded-lg text-sm font-semibold flex items-center gap-2 hover:bg-blue-700 transition-colors shadow-sm">
                <span class="material-symbols-outlined !text-[18px]">download</span>
                Export Report (JSON)
            </button>
        </div>

        <!-- Metric Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Total Tests -->
            <div class="bg-white p-6 rounded-2xl border border-blue-100 shadow-sm flex flex-col">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs text-blue-800/70 uppercase tracking-wider font-semibold">Total Tests</span>
                    <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
                        <span class="material-symbols-outlined !text-[20px]">list_alt</span>
                    </div>
                </div>
                <span class="text-3xl font-bold text-on-surface"><!-- STAT_TOTAL --></span>
            </div>

            <!-- Passed Tests -->
            <div class="bg-white p-6 rounded-2xl border border-emerald-100 shadow-sm flex flex-col">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs text-emerald-800/70 uppercase tracking-wider font-semibold">Passed</span>
                    <div class="p-2 bg-emerald-50 text-emerald-600 rounded-lg">
                        <span class="material-symbols-outlined !text-[20px]">check_circle</span>
                    </div>
                </div>
                <span class="text-3xl font-bold text-on-surface"><!-- STAT_PASSED --></span>
            </div>

            <!-- Failed Tests -->
            <div class="bg-white p-6 rounded-2xl border border-rose-100 shadow-sm flex flex-col">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs text-rose-800/70 uppercase tracking-wider font-semibold">Failed</span>
                    <div class="p-2 bg-rose-50 text-rose-600 rounded-lg">
                        <span class="material-symbols-outlined !text-[20px]">cancel</span>
                    </div>
                </div>
                <span class="text-3xl font-bold text-on-surface"><!-- STAT_FAILED --></span>
            </div>

            <!-- Pass Rate -->
            <div class="bg-white p-6 rounded-2xl border border-indigo-100 shadow-sm flex flex-col">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs text-indigo-800/70 uppercase tracking-wider font-semibold">Pass Rate</span>
                    <div class="p-2 bg-indigo-50 text-indigo-600 rounded-lg">
                        <span class="material-symbols-outlined !text-[20px]">percent</span>
                    </div>
                </div>
                <span class="text-3xl font-bold text-on-surface"><!-- STAT_RATE --></span>
            </div>
        </div>

        <!-- Test Details Table -->
        <div class="bg-white rounded-2xl border border-outline-variant/30 shadow-sm overflow-hidden flex-grow">
            <div class="px-6 py-4 border-b border-outline-variant/30 bg-surface-container-low/30">
                <h3 class="font-semibold text-on-surface text-lg">Test Case Details</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-surface/50 border-b border-outline-variant/20">
                            <th class="px-6 py-4 text-xs text-on-surface-variant uppercase tracking-wider font-semibold">เคสที่ทดสอบ (Test Case)</th>
                            <th class="px-6 py-4 text-xs text-on-surface-variant uppercase tracking-wider font-semibold">เว็บไซต์เป้าหมาย (Target)</th>
                            <th class="px-6 py-4 text-xs text-on-surface-variant uppercase tracking-wider font-semibold">โมดูล (Module)</th>
                            <th class="px-6 py-4 text-xs text-on-surface-variant uppercase tracking-wider font-semibold">เวลาที่ใช้ (Duration)</th>
                            <th class="px-6 py-4 text-xs text-on-surface-variant uppercase tracking-wider font-semibold">สถานะ (Status)</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-outline-variant/10">
                        <!-- TABLE_ROWS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function downloadReport() {
            // Fetch the local report.json and trigger a download
            fetch('report.json')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'report.json';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                })
                .catch(error => {
                    alert('Could not download report.json. Make sure it exists in the same directory.');
                    console.error('Download error:', error);
                });
        }
    </script>
</body>
</html>
