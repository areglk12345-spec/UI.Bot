<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Bot Test Reports</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 30px;
            width: 250px;
            text-align: center;
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            color: #34495e;
        }
        .desc {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 10px;
        }
        footer {
            margin-top: 50px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>📊 UI Bot Test Reports</h1>
    
    <div class="container">
        <!-- Desktop Report -->
        <a href="report_desktop.html" class="card">
            <div class="icon">💻</div>
            <div class="title">Desktop View</div>
            <div class="desc">Chromium, Firefox, WebKit</div>
        </a>

        <!-- Mobile Report -->
        <a href="report_mobile.html" class="card">
            <div class="icon">📱</div>
            <div class="title">Mobile View</div>
            <div class="desc">iPhone 13 (Responsive)</div>
        </a>
    </div>

    <footer>
        <p>Automated UI Testing System</p>
    </footer>

</body>
</html>
